<!-- ═══════════════════════════════════════════════════════════════
     HEADER - PUZH (monninghoff-Stil)
     ═══════════════════════════════════════════════════════════════
     LINKS:  P-Mark Logo (logo_puzh_black/white.svg)
     MITTE:  PUZH Wortmarke (puzh-logo.svg)
     RECHTS: Login-Icon → https://app.puzh.com/login
     Max-Breite 1000px · größer · Glass-Bar · #007aff Hover
     ═══════════════════════════════════════════════════════════════ -->
{{ $home := cond (eq .Language.Lang "de") "/de/" "/" }}
{{ $login := "https://app.puzh.com/login" }}

<header class="fixed top-0 left-0 w-full z-[9999] h-[60px] md:h-[72px]
               bg-[rgba(255,255,255,0.72)] dark:bg-[rgba(29,29,31,0.72)]
               [backdrop-filter:saturate(180%)_blur(20px)] [-webkit-backdrop-filter:saturate(180%)_blur(20px)]
               border-b border-[rgba(0,0,0,0.06)] dark:border-[rgba(255,255,255,0.08)]
               transition-colors duration-200">
  <div class="max-w-[1000px] mx-auto px-5 h-full grid grid-cols-3 items-center">

    <!-- LINKS: P-Mark Logo -->
    <div class="flex justify-start">
      <a href="{{ $home }}" aria-label="PUZH" class="flex items-center">
        <img src="/images/logo_puzh_black.svg" alt="PUZH" class="h-[34px] md:h-[42px] w-auto dark:hidden">
        <img src="/images/logo_puzh_white.svg" alt="PUZH" class="h-[34px] md:h-[42px] w-auto hidden dark:block">
      </a>
    </div>

    <!-- MITTE: PUZH Wortmarke -->
    <div class="flex justify-center">
      <a href="{{ $home }}" aria-label="PUZH Home" class="flex items-center">
        <img src="/images/puzh-logo.svg" alt="PUZH" class="h-[22px] md:h-[28px] w-auto dark:invert">
      </a>
    </div>

    <!-- RECHTS: Login-Icon -->
    <div class="flex justify-end">
      <a href="{{ $login }}" aria-label="Login" class="text-black dark:text-white hover:text-[#007aff] transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" class="h-[30px] w-[30px] md:h-[34px] md:w-[34px] fill-current -scale-x-100" aria-hidden="true">

      </a>
    </div>

  </div>
</header>
